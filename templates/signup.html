<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="center-container">
<div class="glass-card col-md-4 text-center">

<h3 class="mb-3">♻ Create Account</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST">
    <input type="text" name="username" class="form-control mb-3" placeholder="Choose Username" required>
    <input type="password" name="password" class="form-control mb-3" placeholder="Create Password" required>
    <button type="submit" class="btn btn-custom w-100">Signup</button>
</form>

<p class="mt-3">
    Already have account? <a href="/login" class="text-success fw-bold">Login</a>
</p>

</div>
</div>

</body>
</html>
