<!DOCTYPE html>
<html>
<head>
<title>Upload Waste</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand text-white fw-bold">♻ Waste Classifier</a>
    <div>
      <a href="/upload">Upload</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/history">History</a>
      <a href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container center-container">
<div class="glass-card col-md-6 text-center">

<h3 class="mb-4">Upload Waste Image</h3>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" class="form-control mb-3" required>
    <button class="btn btn-custom w-100">Classify Waste</button>
</form>

{% if image_path %}
<hr>

<img src="/{{ image_path }}" class="img-fluid rounded shadow mb-3" width="250">

<h4 class="result-text 
{% if result == 'Recyclable' %}
    recyclable
{% elif result == 'Non-Recyclable' %}
    non-recyclable
{% else %}
    text-warning
{% endif %}
">
{{ result }}
</h4>

<p><strong>Confidence:</strong> {{ percentage }}%</p>
<p><strong>Suggested Bin:</strong> {{ bin }}</p>

{% endif %}

</div>
</div>

</body>
</html>
