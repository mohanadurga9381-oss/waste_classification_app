<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand text-white fw-bold">♻ Waste Classifier</a>
    <div>
      <a href="/upload">Upload</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/history">History</a>
      <a href="/logout">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
<div class="glass-card">

<h3 class="text-center mb-4">📊 Dashboard</h3>

<div class="row text-center">
    <div class="col-md-4 mb-3">
        <div class="p-3 bg-light rounded shadow-sm">
            <h5>Total Uploads</h5>
            <h4>{{ total }}</h4>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="p-3 bg-light rounded shadow-sm">
            <h5 class="text-success">Recyclable</h5>
            <h4>{{ recyclable }}</h4>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="p-3 bg-light rounded shadow-sm">
            <h5 class="text-danger">Non-Recyclable</h5>
            <h4>{{ non_recyclable }}</h4>
        </div>
    </div>
</div>

<hr>

<h5>Recent Uploads</h5>

{% for item in recent %}
<div class="d-flex justify-content-between border-bottom py-2">
    <span>{{ item.date }}</span>
    <span class="{% if item.result=='Recyclable' %}text-success{% elif item.result=='Non-Recyclable' %}text-danger{% else %}text-warning{% endif %}">
        {{ item.result }}
    </span>
</div>
{% endfor %}

</div>
</div>

</body>
</html>
